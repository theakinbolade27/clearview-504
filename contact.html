<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Clearview</title>
    <style>
        :root {
            --primary-color: #145214;
            --bg-color: #ffffff;
            --text-color: #032B44;
            --border-color: #145214;
            --base-font-size: 18px;
            --line-spacing: 1.6;
            --panel-bg: #ffffff;
            --card-bg: #eaf7ea;
            --card-text: #145214;
            --button-text: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: var(--base-font-size);
            line-height: var(--line-spacing);
        }

        nav {
            background: var(--primary-color);
            color: var(--button-text);
            padding: 1rem;
            text-align: center;
        }

        nav a.nav-link {
            color: var(--button-text);
            text-decoration: none;
            margin: 0 0.5rem;
            padding: 0.45rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
        }

        nav a.nav-link:hover,
        nav a.nav-link:focus-visible {
            text-decoration: underline;
            background: rgba(255,255,255,0.16);
            outline: 3px solid #80B8FF;
            outline-offset: 2px;
        }

        main {
            max-width: 700px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        h1 {
            color: var(--primary-color);
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text-color);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            background: var(--primary-color);
            color: var(--button-text);
            border: none;
            border-radius: 6px;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover,
        button:focus-visible {
            outline: 3px solid #80B8FF;
            outline-offset: 2px;
        }

        @media (max-width: 760px) {
            nav {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }
            nav a.nav-link {
                display: block;
            }
            main {
                padding: 1rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav aria-label="Primary navigation">
        <a class="nav-link" href="index.html">Home 🏠</a>
        <a class="nav-link" href="about.html">About ℹ️</a>
        <span aria-label="Clearview">CLEARVIEW</span>
        <a class="nav-link" href="resource.html">RESOURCE📚</a>
        <a class="nav-link" href="accessibility.html">Accessibility 🪛</a>
        <a class="nav-link" href="contact.html">Contact 📫</a>
    </nav>

    <main id="main-content" tabindex="-1">
        <h1>📫 Contact Us</h1>
        <p>We would love to hear from you. Send us a message and we will get back to you soon.</p>

        <label for="fullName">Full Name:</label>
        <input type="text" name="fullName" id="fullName" required>

        <label for="email">Email Address:</label>
        <input type="email" name="email" id="email" required>

        <label for="message">Your Message:</label>
        <textarea name="message" id="message" required></textarea>

        <button type="submit">📩 Send Message</button>
    </main>
</body>
</html>
